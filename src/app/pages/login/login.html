<div id="screen-login">
  <div class="login-card">

    <div class="login-header">
      <div class="login-logo">🐧</div>
      <h1 class="login-title">PENGUIN PROTECT</h1>
      <div class="login-sub">Pannello di controllo Backup</div>
    </div>

    @if (errorMessage) {
      <div class="login-error-box">
        ⚠️ {{ errorMessage }}
      </div>
    }

    <form (ngSubmit)="onFormSubmit()" class="login-form">
      
      <div class="form-group">
        <label class="form-label">Username o Email</label> 
        <div class="input-wrapper">
          <input 
            class="form-input" 
            name="username"
            [(ngModel)]="username" 
            placeholder="Inserisci l'username"
            required />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label> 
        <div class="input-wrapper">
          <input 
            class="form-input" 
            type="password" 
            name="password"
            [(ngModel)]="password" 
            placeholder="••••••••••••"
            required />
        </div>
      </div>

      <button type="submit" class="btn-login">
        ACCEDI <span>→</span>
      </button>
      
      <div class="divider">oppure</div>

      <button type="button" class="btn-github" (click)="loginConGitHub()">
        <svg class="github-icon" viewBox="0 0 24 24" width="20" height="20">
          <path fill="currentColor" d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.9-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.9 1.52 2.34 1.07 2.91.83.1-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.1.39-1.99 1.03-2.69-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.7 1.03 1.6 1.03 2.69 0 3.84-2.34 4.68-4.57 4.93.36.31.68.92.68 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2z"/>
        </svg>
        Accedi con GitHub
      </button>

    </form> 
  </div>
</div>
